name: Terraform Dev Environment

on:
  pull_request:
    branches: [main]
    paths:
      - "environments/dev/**"
      - "modules/**"
  push:
    branches: [main]
    paths:
      - "environments/dev/**"
      - "modules/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-dev
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: environments/dev

jobs:
  terraform:
    name: Terraform Plan/Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::305042756485:role/dev-github-actions-role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Save plan output for PR comment
        if: github.event_name == 'pull_request'
        run: terraform show -no-color tfplan > plan_output.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const plan = fs.readFileSync("environments/dev/plan_output.txt", "utf8");
            const maxLength = 60000;
            const truncated = plan.length > maxLength ? plan.substring(0, maxLength) + "\n\n... (truncated)" : plan;
            const output = `#### Terraform Plan - Dev Environment 📖
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan